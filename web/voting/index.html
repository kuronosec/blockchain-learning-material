<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting DApp</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6fb;
        --card: #ffffff;
        --text: #1f2a37;
        --muted: #5b6778;
        --primary: #0f766e;
        --primary-strong: #0b5d57;
        --danger: #b91c1c;
        --border: #d7deea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 8px;
        color: var(--muted);
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      input {
        flex: 1 1 420px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      button {
        border: 1px solid var(--primary);
        background: var(--primary);
        color: #fff;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: var(--primary-strong);
      }

      button.secondary {
        background: #fff;
        color: var(--primary);
      }

      button.secondary:hover {
        background: #eef9f8;
      }

      .status {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .candidate {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .candidate strong {
        display: inline-block;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Voting DApp (MetaMask)</h1>
        <p>Connect wallet, set your deployed Voting contract, then vote.</p>
        <div class="row">
          <button id="connectBtn">Connect MetaMask</button>
          <button id="switchAmoyBtn" class="secondary">Switch to Amoy</button>
          <button id="refreshBtn" class="secondary">Refresh</button>
        </div>
      </div>

      <div class="card">
        <p><strong>Connected account:</strong> <span id="account">Not connected</span></p>
        <p><strong>Network:</strong> <span id="network">Unknown</span></p>
        <p><strong>Has voted:</strong> <span id="hasVoted">Unknown</span></p>
      </div>

      <div class="card">
        <p><strong>Voting contract address</strong></p>
        <div class="row">
          <input
            id="contractAddress"
            type="text"
            placeholder="0x... (Voting contract on Amoy)"
          />
          <button id="loadContractBtn">Load Contract</button>
        </div>
      </div>

      <div class="card">
        <p><strong>Candidates</strong></p>
        <div id="candidates"></div>
      </div>

      <div class="card">
        <p id="status" class="status">Ready.</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
